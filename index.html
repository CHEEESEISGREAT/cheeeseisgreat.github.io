<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tobobs Engine Launcher</title>
    <style>
        /* Sets the entire page background to clean white */
        body {
            background-color: #ffffff;
            color: #333333;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        p {
            font-size: 1.1rem;
            color: #666666;
            margin-bottom: 30px;
        }

        /* Launcher Button Style */
        .launch-btn {
            background-color: #ff5500;
            color: #ffffff;
            border: none;
            padding: 15px 40px;
            font-size: 1.25rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            transition: background-color 0.2s ease, transform 0.1s ease;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .launch-btn:hover {
            background-color: #e04b00;
        }

        .launch-btn:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <h1>Tobobs Engine</h1>
    <p>Press the button below to boot the 3D sandbox engine locally.</p>

    <a href="tobobs-engine://launch" class="launch-btn">PLAY NOW</a>

</body>
</html>
