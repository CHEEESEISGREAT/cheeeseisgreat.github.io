<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tobobs Engine Web Portal</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #121417;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #f0f3f6;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .container {
            text-align: center;
            background: #1a1d24;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
            border: 1px solid #2d333f;
            max-width: 450px;
            width: 100%;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: #ffffff;
            letter-spacing: 1px;
        }

        p {
            color: #9ba4b4;
            margin-bottom: 30px;
            font-size: 1rem;
            line-height: 1.5;
        }

        .play-btn {
            display: inline-block;
            background-color: #ff5722;
            color: #ffffff;
            text-decoration: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 8px;
            transition: background 0.2s ease, transform 0.1s ease;
            box-shadow: 0 4px 12px rgba(255, 87, 34, 0.3);
        }

        .play-btn:hover {
            background-color: #f4511e;
            transform: translateY(-2px);
        }

        .play-btn:active {
            transform: translateY(0);
        }

        .footer-note {
            margin-top: 25px;
            font-size: 0.8rem;
            color: #525a66;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>TOBOBS ENGINE</h1>
        <p>Launch your custom 3D sandbox platformer directly from the web browser dashboard.</p>
        
        <a href="tobobs-engine://map=obby.json" class="play-btn">LAUNCH OBBY</a>
        
        <div class="footer-note">
            Requires tobobs-launcher setup and Windows registry activation.
        </div>
    </div>

</body>
</html>
