<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tobobs Engine</title>
    <style>
        body {
            background-color: #222;
            color: white;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* Small, dedicated area for the game panel */
        .game-panel {
            background-color: #333;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            width: 320px;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.5);
        }

        h1 {
            margin-top: 0;
            font-size: 24px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Compact placeholder frame for your image */
        .image-container {
            width: 100%;
            height: 180px;
            background-color: #444;
            border-radius: 5px;
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .play-button {
            display: inline-block;
            background-color: #ff5500;
            color: white;
            text-decoration: none;
            padding: 12px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 5px;
            transition: background 0.2s;
        }

        .play-button:hover {
            background-color: #d44400;
        }
    </style>
</head>
<body>

    <div class="game-panel">
        <h1>Obby</h1>
        
        <div class="image-container">
            <img src="obby.png" alt="Obby Preview" onerror="this.style.display='none'; this.parentNode.innerText='[ obby.png placeholder ]';">
        </div>

        <a href="tobobs://obby" class="play-button">PLAY</a>
    </div>

</body>
</html>
