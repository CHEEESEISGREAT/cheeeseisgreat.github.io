<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tobobs Launch Portal</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #f4f6f9;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .card {
            background: #ffffff;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            text-align: center;
            width: 100%;
            max-width: 420px;
            border: 1px solid #eaeaea;
        }
        h1 { font-size: 1.8rem; color: #111111; margin-bottom: 8px; font-weight: 700; }
        p { color: #666666; font-size: 0.95rem; margin-bottom: 30px; }
        .btn-group { display: flex; flex-direction: column; gap: 12px; }
        .launch-btn {
            display: block;
            background-color: #000000;
            color: #ffffff;
            text-decoration: none;
            padding: 14px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 8px;
            transition: all 0.2s ease;
            border: 1px solid transparent;
        }
        .launch-btn:hover { background-color: #222222; transform: translateY(-1px); }
        .launch-btn.secondary {
            background-color: #ffffff;
            color: #111111;
            border: 1px solid #dddddd;
        }
        .launch-btn.secondary:hover { background-color: #f9f9f9; }
    </style>
</head>
<body>

    <div class="card">
        <h1>Tobobs Launcher</h1>
        <p>Select a map architecture to fetch from the GitHub repository.</p>
        <div class="btn-group">
            <a href="tobobs-engine://map=lobby.json" class="launch-btn">Load Remote Lobby</a>
            <a href="tobobs-engine://map=expert_level.json" class="launch-btn secondary">Load Remote Expert Gauntlet</a>
        </div>
    </div>

</body>
</html>
