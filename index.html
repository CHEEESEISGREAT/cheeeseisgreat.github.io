<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tobobs Engine Launcher</title>
    <style>
        body {
            background-color: #ffffff;
            color: #222222;
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        h1 { font-size: 2.5rem; margin-bottom: 5px; }
        p { color: #666666; margin-bottom: 25px; }
        
        .launch-btn {
            background-color: #ff5500;
            color: white;
            border: none;
            padding: 16px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            box-shadow: 0 4px 10px rgba(255,85,0,0.3);
        }
        .launch-btn:hover { background-color: #e04b00; }
    </style>
</head>
<body>

    <h1>Tobobs Engine</h1>
    <p>Select a map configuration to send to the engine:</p>

    <a href="tobobs-engine://map=lobby.json" class="launch-btn">LAUNCH LOBBY MAP</a>
    
    <br>
    
    <a href="tobobs-engine://map=expert_level.json" style="background-color: #333;" class="launch-btn">LAUNCH EXPERT MAP</a>

</body>
</html>
