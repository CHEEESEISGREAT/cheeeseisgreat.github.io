<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Tobobs Engine</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <style>
        /* --- CORE GAME HUB STYLING --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #111217;
            color: #ffffff;
            padding-bottom: 3rem;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        /* --- NAVIGATION BAR --- */
        .navbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: #16171d;
            padding: 0.75rem 1.5rem;
            border-bottom: 1px solid #23252f;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .navbar-logo {
            font-size: 1.35rem;
            font-weight: 800;
            color: #ffffff;
            letter-spacing: -0.5px;
        }

        .navbar-search {
            flex: 0 1 400px;
            margin: 0 1rem;
        }

        .navbar-search form {
            display: flex;
            background-color: #1d1e26;
            border: 1px solid #2f3242;
            border-radius: 6px;
            overflow: hidden;
        }

        .navbar-search input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 0.5rem 0.85rem;
            color: #ffffff;
            font-size: 0.9rem;
            outline: none;
        }

        .navbar-search button {
            background-color: #2a2c3a;
            border: none;
            color: #a0a5b5;
            padding: 0 1rem;
            font-size: 0.85rem;
            cursor: pointer;
            border-left: 1px solid #2f3242;
        }

        .navbar-search button:hover {
            background-color: #333647;
            color: #ffffff;
        }

        .navbar-actions {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .btn-download-nav {
            background-color: #ffffff;
            color: #111217;
            padding: 0.45rem 1rem;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 600;
            transition: opacity 0.2s;
        }

        .btn-download-nav:hover {
            opacity: 0.9;
        }

        .btn-discord {
            background-color: #5865F2;
            color: #ffffff;
            padding: 0.45rem 1rem;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .btn-discord:hover {
            background-color: #4752c4;
        }

        .btn-signout-sm {
            background-color: #23252f;
            border: 1px solid #2f3242;
            color: #ffffff;
            padding: 0.45rem 1rem;
            border-radius: 6px;
            font-size: 0.85rem;
            cursor: pointer;
        }

        .btn-signout-sm:hover {
            background-color: #2d303d;
        }

        /* --- MAIN CORE PAGE LAYOUT --- */
        .page {
            max-width: 1250px;
            margin: 2rem auto;
            padding: 0 1.5rem;
        }

        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.25rem;
        }

        .section-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: #ffffff;
        }

        .section-link {
            font-size: 0.9rem;
            color: #a0a5b5;
            font-weight: 500;
        }

        .section-link:hover {
            color: #ffffff;
        }

        .section-sep {
            border: none;
            border-top: 1px solid #23252f;
            margin: 2rem 0;
        }

        /* --- FRIENDS CAROUSEL BAR --- */
        .carousel-wrap {
            position: relative;
            display: flex;
            align-items: center;
        }

        .friends-row {
            display: flex;
            gap: 1rem;
            overflow-x: auto;
            width: 100%;
            padding-bottom: 0.5rem;
        }

        .friends-row::-webkit-scrollbar {
            height: 4px;
        }

        .friends-row::-webkit-scrollbar-thumb {
            background-color: #23252f;
            border-radius: 10px;
        }

        .friend-card {
            background-color: #16171d;
            border: 1px solid #23252f;
            border-radius: 8px;
            padding: 1rem;
            min-width: 130px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            transition: transform 0.2s, border-color 0.2s;
        }

        .friend-card:hover {
            transform: translateY(-2px);
            border-color: #383c4e;
        }

        .friend-avatar-wrap {
            position: relative;
            margin-bottom: 0.75rem;
        }

        .friend-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.1rem;
            color: #ffffff;
            text-transform: uppercase;
        }

        .status-dot {
            position: absolute;
            bottom: 0;
            right: 2px;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            border: 2px solid #16171d;
        }

        .status-dot.online { background-color: #2ec4b6; }
        .status-dot.in-game { background-color: #9b5de5; }

        .friend-name {
            font-size: 0.85rem;
            font-weight: 500;
            color: #e2e4eb;
            max-width: 110px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* --- EXPANDED GAMES GRID DISPLAY --- */
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 1.5rem;
        }

        .game-card {
            background-color: #16171d;
            border: 1px solid #23252f;
            border-radius: 10px;
            overflow: hidden;
            transition: transform 0.2s, border-color 0.2s;
            display: flex;
            flex-direction: column;
        }

        .game-card:hover {
            transform: translateY(-4px);
            border-color: #383c4e;
        }

        .game-card-thumb {
            width: 100%;
            aspect-ratio: 16 / 10;
            background-color: #23252f;
            overflow: hidden;
            position: relative;
        }

        /* Placeholder icon if graphic asset is non-existent */
        .game-card-thumb::before {
            content: '\f11b';
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2.5rem;
            color: #2d303f;
            z-index: 1;
        }

        .game-card-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: relative;
            z-index: 2;
        }

        .game-card-body {
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.35rem;
        }

        .game-card-title {
            font-size: 0.95rem;
            font-weight: 600;
            color: #ffffff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .game-card-meta {
            font-size: 0.8rem;
            color: #06d6a0;
            font-weight: 500;
        }

        /* --- INITIAL RUNTIME LOADING ANIMATION --- */
        .skeleton {
            background: linear-gradient(90deg, #1d1e26 25%, #282a36 50%, #1d1e26 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
        }

        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .skel-card {
            background-color: #16171d;
            border: 1px solid #23252f;
            border-radius: 8px;
            padding: 1rem;
            min-width: 130px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .skel-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            margin-bottom: 0.75rem;
        }

        .skel-name {
            width: 70px;
            height: 12px;
            border-radius: 4px;
        }

        .empty-msg {
            font-size: 0.9rem;
            color: #62677a;
            padding: 1rem 0;
        }
    </style>
    <script>
        function escapeHtml(s){return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
        
        // Generates consistent colors for fallback procedural avatars
        function avatarColor(str) {
            let hash = 0;
            for (let i = 0; i < str.length; i++) {
                hash = str.charCodeAt(i) + ((hash << 5) - hash);
            }
            const colors = ['#e63946', '#457b9d', '#1d3557', '#2a9d8f', '#e9c46a', '#f4a261', '#e76f51', '#6b705c'];
            return colors[Math.abs(hash) % colors.length];
        }
        function initial(str) { return str ? str.charAt(0) : '?'; }
    </script>
</head>
<body>

<nav class="navbar">
    <a class="navbar-logo" href="#">Tobobs Engine</a>
    <div class="navbar-search">
        <form action="#" method="get" id="search-form" onsubmit="event.preventDefault();">
            <input type="text" name="q" id="search-input" placeholder="Search servers...">
            <button type="submit">Search</button>
        </form>
    </div>
    <div class="navbar-actions">
        <a class="btn-download-nav" href="https://github.com/CHEEESEISGREAT/cheeeseisgreat.github.io" target="_blank">Repository</a>
        <a class="btn-discord" href="https://discord.gg/ncNzKqeJrh" target="_blank" rel="noopener">Discord</a>
        <a class="btn-signout-sm" id="my-profile-btn" href="#">Profile</a>
    </div>
</nav>

<div class="page">
    <div class="section-header">
        <span class="section-title" id="friends-title">Friends</span>
        <a class="section-link" href="#">Social</a>
    </div>
    <div class="carousel-wrap" id="friends-carousel">
        <div class="friends-row" id="friends-row">
            <div class="skel-card"><div class="skel-avatar skeleton"></div><div class="skel-name skeleton"></div></div>
            <div class="skel-card"><div class="skel-avatar skeleton"></div><div class="skel-name skeleton"></div></div>
            <div class="skel-card"><div class="skel-avatar skeleton"></div><div class="skel-name skeleton"></div></div>
            <div class="skel-card"><div class="skel-avatar skeleton"></div><div class="skel-name skeleton"></div></div>
        </div>
    </div>

    <hr class="section-sep">

    <div class="section-header">
        <span class="section-title">Games</span>
    </div>    
    <div class="games-grid" id="games-grid">
        </div>
</div>

<script>
    async function init() {
        // --- SIMULATED USER CORRELATION LAYER ---
        const activeFriends = [
            { username: "Bob", id: 101, online_status: "in_game" },
            { username: "Timmy", id: 102, online_status: "online" },
            { username: "Guest_482", id: 103, online_status: "offline" }
        ];

        const row = document.getElementById('friends-row');
        row.innerHTML = '';
        
        document.getElementById('friends-title').textContent = `Friends (${activeFriends.length})`;
        
        for (const f of activeFriends) {
            let dotHTML = '';
            if (f.online_status === 'in_game') dotHTML = '<span class="status-dot in-game"></span>';
            else if (f.online_status === 'online') dotHTML = '<span class="status-dot online"></span>';

            const card = document.createElement('div');
            card.className = 'friend-card';
            card.innerHTML = `
                <div class="friend-avatar-wrap">
                    <div class="friend-avatar" style="background:${avatarColor(f.username)}">${escapeHtml(initial(f.username))}</div>
                    ${dotHTML}
                </div>
                <span class="friend-name">${escapeHtml(f.username)}</span>
            `;
            row.appendChild(card);
        }

        // --- PRODUCTION LEVEL INJECTION ENGINE ROUTER ---
        // Reads directly out of your active file list arrays manually
        const games = [
            { id: "obby.json", name: "Default Obby Map Layout", activePlayers: 12 },
        ];

        const grid = document.getElementById('games-grid');
        grid.innerHTML = '';

        for (const g of games) {
            const card = document.createElement('a');
            card.className = 'game-card';
            // Formatted perfectly to call your local deep-linking registry protocol handler
            card.href = `tobobs-engine://map=${g.id}`;
            card.innerHTML = `
                <div class="game-card-thumb">
                    <img src="assets/thumbnails/${g.id}.png" onerror="this.style.display='none';" alt="${escapeHtml(g.name)}">
                </div>
                <div class="game-card-body">
                    <div class="game-card-title">${escapeHtml(g.name)}</div>
                    <div class="game-card-meta">${g.activePlayers} playing</div>
                </div>
            `;
            grid.appendChild(card);
        }
    }
    init();
</script>

</body>
</html>
