<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" type="image/x-icon" href="tobobs.ico">
    <title>Tobobs</title>
    <style>
        body {
            color: black;
            font-family: Arial, sans-serif;
            background-color: white;
            margin: 0;
            padding: 0;
        }

        /* Clean Navbar */
        .navbar {
            background-color: #f8f9fa;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
        }

        .navbar-logo {
            font-size: 24px;
            font-weight: bold;
            color: black;
            text-decoration: none;
        }

        /* Right side layout alignment */
        .navbar-actions {
            display: flex;
            align-items: center;
        }

        .navbar-actions .yt-link {
            color: #0066cc;
            text-decoration: none;
            margin-left: 20px;
            font-weight: bold;
        }

        .navbar-actions .yt-link:hover {
            text-decoration: underline;
        }

        /* Top Right Download Button */
        .download-btn {
            display: inline-block;
            background-color: #0066cc;
            color: white;
            padding: 8px 16px;
            font-size: 14px;
            font-weight: bold;
            text-decoration: none;
            border-radius: 4px;
            margin-left: 20px;
            transition: background-color 0.2s;
        }

        .download-btn:hover {
            background-color: #004c99;
        }

        /* Main Content */
        .page {
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
        }

        h1 {
            font-size: 32px;
            margin-bottom: 20px;
        }

        ul {
            padding-left: 20px;
            line-height: 1.6;
            font-size: 16px;
        }

        li {
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <a class="navbar-logo" href="#">Tobobs</a>
        <div class="navbar-actions">
            <a href="https://www.youtube.com/channel/UC_kikknTWzwpXqa2keaiBtw" target="_blank" class="yt-link">YouTube</a>
            
            <a href="download.html" class="download-btn">Download</a>
        </div>
    </nav>

    <div class="page">
        <h1>Welcome!</h1>
        
        <ul>
            <li>This will be the Tobobs website in the future.</li>
            <li>Stay tuned.</li>
            <li>Go to our official <a href="https://www.youtube.com/channel/UC_kikknTWzwpXqa2keaiBtw" target="_blank">YouTube channel</a>!</li>
        </ul>
    </div>

</body>
</html>
