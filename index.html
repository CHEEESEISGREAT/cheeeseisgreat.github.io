<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tobobs Launcher Portal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #1a1d24;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #ffffff;
        }

        /* The Game Hub Canvas container */
        .game-canvas {
            width: 600px;
            background-color: #11141a;
            border: 3px solid #2c323f;
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .game-title {
            font-size: 3.5rem;
            font-weight: 900;
            letter-spacing: 4px;
            color: #f0f4f8;
            margin-bottom: 25px;
            text-transform: uppercase;
        }

        /* Image viewport wrapper matching your canvas specs */
        .image-placeholder {
            width: 100%;
            height: 280px;
            background-color: #1f232d;
            border: 4px solid #3a4254;
            border-radius: 8px;
            margin-bottom: 35px;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .image-placeholder img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Roblox-style prominent action launcher button */
        .play-btn {
            display: inline-block;
            width: 220px;
            padding: 16px 0;
            background-color: #ff5500;
            color: #ffffff;
            font-size: 1.5rem;
            font-weight: bold;
            text-decoration: none;
            border: 2px solid #ff7722;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s ease, transform 0.1s ease;
            text-transform: uppercase;
        }

        .play-btn:hover {
            background-color: #e04b00;
        }

        .play-btn:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <div class="game-canvas">
        <h1 class="game-title">Obby</h1>
        
        <div class="image-placeholder">
            <img src="obby.png" alt="Obby Preview Image" onerror="this.style.display='none'; this.parentNode.innerText='[ Place obby.png in your repository folder ]';">
        </div>

        <a href="tobobs://obby" class="play-btn">Play</a>
    </div>

</body>
</html>
