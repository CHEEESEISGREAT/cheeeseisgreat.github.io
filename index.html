<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tobobs Engine Launcher</title>
    <style>
        body {
            background-color: #ffffff;
            color: #222222;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        h1 {
            font-size: 2.8rem;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        p {
            font-size: 1.1rem;
            color: #555555;
            margin-bottom: 32px;
        }

        .launch-btn {
            background-color: #ff5500;
            color: #ffffff;
            border: none;
            padding: 16px 48px;
            font-size: 1.3rem;
            font-weight: 700;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            box-shadow: 0 4px 12px rgba(255, 85, 0, 0.2);
            transition: all 0.15s ease-in-out;
        }

        .launch-btn:hover {
            background-color: #e04b00;
            box-shadow: 0 6px 16px rgba(255, 85, 0, 0.3);
            transform: translateY(-1px);
        }

        .launch-btn:active {
            transform: translateY(1px);
            box-shadow: 0 2px 6px rgba(255, 85, 0, 0.2);
        }
    </style>
</head>
<body>

    <h1>Tobobs Engine</h1>
    <p>Click play to launch the 3D dynamic runtime environment.</p>

    <a href="tobobs-engine://launch" class="launch-btn">PLAY NOW</a>

</body>
</html>
